<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Água - Diário de Emoções</title>
    <link rel="shortcut icon" href="../images/main-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <!-- Sidebar compartilhada (injetada) -->
    <div id="sidebar-root"></div>
    <script src="../scripts/sidebar.js"></script>

    <!-- Water Section -->
    <div id="app" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4">Água</h2>

                <div v-if="errorMessage" class="alert alert-danger alert-dismissible mb-3" role="alert">
                    {{ errorMessage }}
                    <button type="button" class="btn-close" @click="errorMessage = ''"></button>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body text-center">
                        <h5 class="card-title mb-3">Garrafas hoje</h5>
                        <div class="d-flex align-items-center justify-content-center gap-3 mb-3">
                            <i class="bi bi-cup-straw" style="font-size: 2.5rem; color: #0d6efd;"></i>
                            <span class="display-2 fw-bold text-primary">{{ todayQuantity }}</span>
                        </div>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-secondary" @click="decrement" :disabled="todayQuantity === 0">
                                <i class="bi bi-dash-lg"></i>
                            </button>
                            <button class="btn btn-primary btn-lg" @click="increment">
                                <i class="bi bi-plus-lg"></i> Beber garrafa
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Últimos dias</h5>
                        <div v-if="history.length === 0" class="text-center text-muted py-3">
                            <p class="mb-0">Nenhum registro nos últimos dias.</p>
                        </div>
                        <ul class="list-group list-group-flush">
                            <li v-for="entry in history" :key="entry.date"
                                class="list-group-item d-flex justify-content-between px-0">
                                <span>{{ entry.date }}</span>
                                <span class="fw-semibold">{{ entry.quantity }} garrafa(s)</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <p class="mb-0">Diary&copy;2026</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../scripts/water.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
