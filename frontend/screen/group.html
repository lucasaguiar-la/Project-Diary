<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo - Diário de Emoções</title>
    <link rel="shortcut icon" href="../images/main-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <!-- Sidebar compartilhada (injetada) -->
    <div id="sidebar-root"></div>
    <script src="../scripts/sidebar.js"></script>

    <!-- Group Section -->
    <div id="app" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <a href="groups.html" class="btn btn-sm btn-link text-decoration-none px-0 mb-2">
                    <i class="bi bi-arrow-left"></i> Voltar aos grupos
                </a>

                <div v-if="errorMessage" class="alert alert-danger alert-dismissible mb-3" role="alert">
                    {{ errorMessage }}
                    <button type="button" class="btn-close" @click="errorMessage = ''"></button>
                </div>

                <div v-if="group" class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h2 class="card-title mb-3">{{ group.name }}</h2>
                        <label class="form-label small text-muted mb-1">Código de convite (compartilhe para outros entrarem)</label>
                        <div class="input-group">
                            <input type="text" class="form-control" :value="group.inviteCode" readonly>
                            <button class="btn btn-outline-secondary" type="button" @click="copyInvite">
                                <i class="bi" :class="copied ? 'bi-check-lg' : 'bi-clipboard'"></i>
                                {{ copied ? 'Copiado' : 'Copiar' }}
                            </button>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Membros ({{ members.length }})</h5>
                        <div class="list-group list-group-flush">
                            <div v-for="m in members" :key="m.userId"
                                 class="list-group-item d-flex align-items-center gap-2 px-0">
                                <i class="bi bi-person-circle text-secondary" style="font-size: 1.25rem;"></i>
                                <span>{{ m.firstName }} {{ m.lastName }}</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="card-title mb-0">Listas</h5>
                            <button type="button" class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addListModal">
                                <i class="bi bi-plus-lg"></i>
                            </button>
                        </div>

                        <div v-if="lists.length === 0" class="text-center text-muted py-3">
                            <i class="bi bi-list-check" style="font-size: 2rem;"></i>
                            <p class="mt-2 mb-0">Nenhuma lista criada ainda.</p>
                        </div>

                        <div class="list-group list-group-flush">
                            <a v-for="list in lists" :key="list.id"
                               :href="listUrl(list)"
                               class="list-group-item list-group-item-action d-flex align-items-center justify-content-between px-0">
                                <span><i class="bi bi-card-checklist me-2 text-primary"></i>{{ list.name }}</span>
                                <i class="bi bi-chevron-right text-muted"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add List Modal -->
        <div class="modal fade" id="addListModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form @submit.prevent="createList">
                        <div class="modal-header">
                            <h5 class="modal-title">Nova Lista</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                        </div>
                        <div class="modal-body">
                            <input type="text" class="form-control" v-model="newListName"
                                   placeholder="Ex: Tarefas de casa, Metas da semana..." required>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Criar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <p class="mb-0">Diary&copy;2026</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../scripts/group.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
