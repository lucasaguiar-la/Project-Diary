<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Humor - Diário de Emoções</title>
    <link rel="shortcut icon" href="../images/main-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><i class="bi bi-journal-text"></i> Meu Diário</a>
            <div class="d-flex gap-2">
                <a href="notes.html" class="btn btn-outline-secondary">Notas <i class="bi bi-arrow-left"></i></a>
                <button class="btn btn-outline-danger" id="logout-button">Sair <i class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>
    </nav>

    <!-- Mood History Section -->
    <div id="app" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="text-center mb-4">Histórico de Humor</h2>

                <div v-if="sortedHistory.length === 0" class="text-center text-muted py-5">
                    <i class="bi bi-emoji-neutral" style="font-size: 3rem;"></i>
                    <p class="mt-3">Nenhum registro de humor ainda. Crie notas com um humor para vê-los aqui!</p>
                </div>

                <div class="list-group">
                    <div v-for="entry in sortedHistory" :key="entry.noteId" class="list-group-item mb-2 shadow-sm">
                        <div class="d-flex align-items-center gap-3">
                            <span style="font-size: 2.5rem; line-height: 1;">{{ entry.moods[0].emoji }}</span>
                            <div class="flex-grow-1">
                                <div class="d-flex justify-content-between align-items-center">
                                    <strong class="text-capitalize">{{ entry.moods[0].title }}</strong>
                                    <small class="text-muted">{{ formatDate(entry.createdAt) }}</small>
                                </div>
                                <small class="text-muted">{{ entry.noteTitle }}</small>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <p class="mb-0">LucasAguiar&copy;2025</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../scripts/mood-history.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
