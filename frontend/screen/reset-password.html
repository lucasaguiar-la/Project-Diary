<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir senha - Diário de Emoções</title>
    <link rel="shortcut icon" href="../images/main-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><i class="bi bi-journal-text"></i> Meu Diário</a>
        </div>
    </nav>

    <!-- Reset Password Section -->
    <div id="app">
        <section class="py-5">
            <div class="container">
                <div class="row justify-content-center">
                    <div class="col-md-6 col-lg-4">
                        <div class="card shadow">
                            <div class="card-body p-4">

                                <h2 class="text-center mb-4">Redefinir senha</h2>
                                <form @submit.prevent="handleResetPassword">
                                    <div class="alert alert-success" v-if="successMessage">{{ successMessage }}</div>
                                    <div class="alert alert-danger" v-if="errorMessage">{{ errorMessage }}</div>

                                    <div class="mb-3">
                                        <label for="newPassword" class="form-label">Nova senha</label>
                                        <input type="password" class="form-control" id="newPassword" v-model="newPassword" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="confirmPassword" class="form-label">Confirmar nova senha</label>
                                        <input type="password" class="form-control" id="confirmPassword" v-model="confirmPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100" :disabled="!token">Redefinir senha</button>
                                </form>
                                <div class="text-center mt-3">
                                    <p class="mb-0"><a href="login.html" class="text-decoration-none">Voltar ao login</a></p>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <p class="mb-0">Diary&copy;2026</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../scripts/reset-password.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
