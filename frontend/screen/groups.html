<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupos - Diário de Emoções</title>
    <link rel="shortcut icon" href="../images/main-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <!-- Sidebar compartilhada (injetada) -->
    <div id="sidebar-root"></div>
    <script src="../scripts/sidebar.js"></script>

    <!-- Groups Section -->
    <div id="app" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-2">
                    <h2 class="mb-0">Meus Grupos</h2>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#joinGroupModal">
                            <i class="bi bi-box-arrow-in-right"></i> Entrar em grupo
                        </button>
                        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createGroupModal">
                            <i class="bi bi-plus-lg"></i> Criar grupo
                        </button>
                    </div>
                </div>

                <div v-if="errorMessage" class="alert alert-danger alert-dismissible mb-3" role="alert">
                    {{ errorMessage }}
                    <button type="button" class="btn-close" @click="errorMessage = ''"></button>
                </div>

                <div v-if="groups.length === 0" class="text-center text-muted py-5">
                    <i class="bi bi-people" style="font-size: 2.5rem;"></i>
                    <p class="mt-2 mb-0">Você ainda não participa de nenhum grupo.</p>
                </div>

                <div class="row g-3">
                    <div class="col-md-6" v-for="group in groups" :key="group.id">
                        <a :href="'group.html?groupId=' + group.id" class="text-decoration-none text-reset">
                            <div class="card shadow-sm h-100">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-start">
                                        <h5 class="card-title mb-1">{{ group.name }}</h5>
                                        <i class="bi bi-people-fill text-primary" style="font-size: 1.5rem;"></i>
                                    </div>
                                    <p class="text-muted mb-0 small">
                                        {{ group.memberCount }} {{ group.memberCount === 1 ? 'membro' : 'membros' }}
                                    </p>
                                    <p class="text-muted mb-0 small">Código: {{ group.inviteCode }}</p>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Group Modal -->
        <div class="modal fade" id="createGroupModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form @submit.prevent="createGroup">
                        <div class="modal-header">
                            <h5 class="modal-title">Novo Grupo</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                        </div>
                        <div class="modal-body">
                            <input type="text" class="form-control" v-model="newGroupName"
                                   placeholder="Ex: Família, República, Trabalho..." required>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Criar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Join Group Modal -->
        <div class="modal fade" id="joinGroupModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form @submit.prevent="joinGroup">
                        <div class="modal-header">
                            <h5 class="modal-title">Entrar em um Grupo</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                        </div>
                        <div class="modal-body">
                            <label class="form-label">Código de convite</label>
                            <input type="text" class="form-control" v-model="joinCode"
                                   placeholder="Ex: a1b2c3d4" required>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i> Entrar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <p class="mb-0">Diary&copy;2026</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../scripts/groups.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
