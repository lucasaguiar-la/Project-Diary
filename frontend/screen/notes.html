<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Notas - Diário de Emoções</title>
    <link rel="shortcut icon" href="../images/main-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <!-- Sidebar compartilhada (injetada) -->
    <div id="sidebar-root"></div>
    <script src="../scripts/sidebar.js"></script>

    <!-- Notes Section -->
    <div id="app" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="text-center mb-4">Mural de Emoções</h2>

                <div v-if="errorMessage" class="alert alert-danger alert-dismissible mb-3" role="alert">
                    {{ errorMessage }}
                    <button type="button" class="btn-close" @click="errorMessage = ''"></button>
                </div>

                <!-- New Note Form -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Nova Anotação</h5>
                        <form @submit.prevent="addNote" id="note-form">

                            <div class="mb-3">
                                <textarea class="form-control" style="height: 80px; max-height: 120px;" v-model="newNote.text" rows="3" placeholder="Como você está se sentindo hoje?" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Qual seu humor?</label>
                                <div class="d-flex flex-wrap justify-content-around gap-2">
                                    <button v-for="m in moods" :key="m.value" type="button"
                                            class="btn btn-lg" style="border-width: 2px;"
                                            :title="moodLabel(m.value)"
                                            :style="moodBtnStyle(m.value)"
                                            @click="newNote.mood = m.value">
                                        <i class="bi" :class="m.icon"></i>
                                    </button>
                                </div>

                                <!-- Legenda de cores -->
                                <div class="d-flex flex-wrap gap-2 mt-2">
                                    <span v-for="m in moods" :key="'leg-' + m.value"
                                          class="d-inline-flex align-items-center small text-muted">
                                        <span class="d-inline-block rounded-circle me-1"
                                              style="width: 12px; height: 12px;"
                                              :style="{ backgroundColor: moodColor(m.value) }"></span>
                                        {{ moodLabel(m.value) }}
                                    </span>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Salvar Nota</button>

                        </form>
                    </div>
                </div>

                <!-- Display Notes -->
                <h3 class="text-center mb-3">Suas Memórias</h3>

                <div class="d-flex justify-content-end align-items-center mb-3">
                    <label class="form-label mb-0 me-2 small text-muted">Filtrar por humor:</label>
                    <select class="form-select form-select-sm w-auto" v-model="moodFilter">
                        <option value="todos">Todos</option>
                        <option v-for="m in moods" :key="'f-' + m.value" :value="m.value">
                            {{ moodLabel(m.value) }}
                        </option>
                    </select>
                </div>

                <div v-if="notes.length === 0" class="text-center text-muted">
                    <p>Você ainda não tem nenhuma nota. Comece a escrever!</p>
                </div>
                <div v-else-if="filteredNotes.length === 0" class="text-center text-muted">
                    <p>Nenhuma nota para este humor.</p>
                </div>

                <div class="list-group">
                    <div v-for="note in filteredNotes" :key="note.id" class="list-group-item flex-column align-items-start mb-2 shadow-sm">

                        <!-- Modo visualizacao -->
                        <div v-if="editingId !== note.id">
                            <div class="d-flex flex-wrap w-100 justify-content-between align-items-center">
                                <h5 class="mb-1">{{ getMoodDisplay(note) }}</h5>
                                <div class="d-flex align-items-center gap-2">
                                    <small class="text-muted">{{ formatDate(note.createdAt) }}</small>
                                    <button class="btn btn-sm btn-outline-secondary" @click="startEdit(note)"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-sm btn-outline-danger" @click="deleteNote(note.id)"><i class="bi bi-trash"></i></button>
                                </div>
                            </div>
                            <p class="mb-1 mt-2">{{ note.content }}</p>
                        </div>

                        <!-- Modo edicao -->
                        <div v-else>
                            <textarea class="form-control mb-2" v-model="editContent" rows="3"></textarea>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-success" @click="saveEdit(note)">Salvar</button>
                                <button class="btn btn-sm btn-secondary" @click="cancelEdit()">Cancelar</button>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <p class="mb-0">Diary&copy;2026</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../scripts/mood-colors.js"></script>
    <script src="../scripts/notes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
