<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Notas - Diário de Emoções</title>
    <link rel="shortcut icon" href="../images/main-logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style/index.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="../index.html"><i class="bi bi-journal-text"></i> Meu Diário</a>
            <div class="d-flex gap-2">
                <a href="mood-history.html" class="btn btn-outline-secondary">Humor <i class="bi bi-graph-up"></i></a>
                <a href="dashboard.html" class="btn btn-outline-secondary">Dashboard <i class="bi bi-fire"></i></a>
                <a href="agenda.html" class="btn btn-outline-secondary">Agenda <i class="bi bi-calendar3"></i></a>
                <a href="water.html" class="btn btn-outline-secondary">Água <i class="bi bi-cup-straw"></i></a>
                <button class="btn btn-outline-danger" id="logout-button">Sair <i class="bi bi-box-arrow-right"></i></button>
            </div>
        </div>
    </nav>

    <!-- Notes Section -->
    <div id="app" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="text-center mb-4">Mural de Emoções</h2>

                <div v-if="errorMessage" class="alert alert-danger alert-dismissible mb-3" role="alert">
                    {{ errorMessage }}
                    <button type="button" class="btn-close" @click="errorMessage = ''"></button>
                </div>

                <!-- New Note Form -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Nova Anotação</h5>
                        <form @submit.prevent="addNote" id="note-form">

                            <div class="mb-3">
                                <textarea class="form-control" style="height: 80px; max-height: 120px;" v-model="newNote.text" rows="3" placeholder="Como você está se sentindo hoje?" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Qual seu humor?</label>
                                <div class="d-flex justify-content-around">

                                    <!-- Emoji feliz -->
                                    <button type="button" class="btn btn-lg" :class="{'btn-outline-success': newNote.mood !== 'feliz', 'btn-success': newNote.mood === 'feliz'}" @click="newNote.mood = 'feliz'"><i class="bi bi-emoji-smile"></i></button>
                                    <!-- Emoji neutro -->
                                    <button type="button" class="btn btn-lg" :class="{'btn-outline-warning': newNote.mood !== 'neutro', 'btn-warning': newNote.mood === 'neutro'}" @click="newNote.mood = 'neutro'"><i class="bi bi-emoji-neutral"></i></button>
                                    <!-- Emoji triste -->
                                    <button type="button" class="btn btn-lg" :class="{'btn-outline-danger': newNote.mood !== 'triste', 'btn-danger': newNote.mood === 'triste'}" @click="newNote.mood = 'triste'"><i class="bi bi-emoji-frown"></i></button>
                                    <!-- Emoji tranquilo -->
                                    <button type="button" class="btn btn-lg" :class="{'btn-outline-primary': newNote.mood !== 'calmo', 'btn-primary': newNote.mood === 'calmo'}" @click="newNote.mood = 'calmo'"><i class="bi bi-emoji-sunglasses"></i></button>

                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Salvar Nota</button>

                        </form>
                    </div>
                </div>

                <!-- Display Notes -->
                <h3 class="text-center mb-3">Suas Memórias</h3>
                <div v-if="notes.length === 0" class="text-center text-muted">
                    <p>Você ainda não tem nenhuma nota. Comece a escrever!</p>
                </div>

                <div class="list-group">
                    <div v-for="note in sortedNotes" :key="note.id" class="list-group-item flex-column align-items-start mb-2 shadow-sm">

                        <!-- Modo visualizacao -->
                        <div v-if="editingId !== note.id">
                            <div class="d-flex w-100 justify-content-between align-items-center">
                                <h5 class="mb-1">{{ getMoodDisplay(note) }}</h5>
                                <div class="d-flex align-items-center gap-2">
                                    <small class="text-muted">{{ formatDate(note.createdAt) }}</small>
                                    <button class="btn btn-sm btn-outline-secondary" @click="startEdit(note)"><i class="bi bi-pencil"></i></button>
                                    <button class="btn btn-sm btn-outline-danger" @click="deleteNote(note.id)"><i class="bi bi-trash"></i></button>
                                </div>
                            </div>
                            <p class="mb-1 mt-2">{{ note.content }}</p>
                        </div>

                        <!-- Modo edicao -->
                        <div v-else>
                            <textarea class="form-control mb-2" v-model="editContent" rows="3"></textarea>
                            <div class="d-flex gap-2">
                                <button class="btn btn-sm btn-success" @click="saveEdit(note)">Salvar</button>
                                <button class="btn btn-sm btn-secondary" @click="cancelEdit()">Cancelar</button>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="text-center">
                    <p class="mb-0">Diary&copy;2026</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../scripts/notes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
