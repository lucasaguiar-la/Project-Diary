spring.application.name=Diary
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/diary_db}
spring.datasource.username=${DB_USER:diary_user}
spring.datasource.password=${DB_PASSWORD:all*}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
server.port=${SERVER_PORT:8081}

jwt.secret=${JWT_SECRET:troque-este-valor-por-um-segredo-longo-e-aleatorio-com-32-chars-minimo}
jwt.expiration-ms=86400000

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL:http://localhost:8420}
app.reset-token-expiration-minutes=${RESET_TOKEN_EXPIRATION_MINUTES:30}