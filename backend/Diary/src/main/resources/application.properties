spring.application.name=Diary
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/meudiario}
spring.datasource.username=${DB_USER:user_meudiario}
spring.datasource.password=${DB_PASSWORD:all*}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
server.port=${SERVER_PORT:8081}

jwt.secret=${JWT_SECRET:troque-este-valor-por-um-segredo-longo-e-aleatorio-com-32-chars-minimo}
jwt.expiration-ms=86400000